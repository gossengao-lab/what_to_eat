<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="今天吃什么灵感助手 — 情境感知智能美食推荐">
  <meta name="theme-color" content="#FF6B35">
  <title>今天吃什么</title>
  <!-- 首屏关键 CSS，加速 FCP -->
  <style>
    :root { --Color-primary: #FF6B35; --Color-background: #F7F7F7; --Color-cardBackground: #FFFFFF; --Color-textPrimary: #1A1A1A; --Color-textSecondary: #6B6B6B; --Color-divider: #EEEEEE; --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--Color-background); color: var(--Color-textPrimary); line-height: 1.5; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    button { font-family: inherit; cursor: pointer; -webkit-appearance: none; appearance: none; border: none; background: none; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; padding-top: var(--safe-top); }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--Color-cardBackground); border-bottom: 1px solid var(--Color-divider); position: sticky; top: 0; z-index: 10; }
    .app-logo { font-size: 18px; font-weight: 700; color: var(--Color-primary); }
    .app-main { flex: 1; padding: 20px 16px calc(24px + var(--safe-bottom)); display: flex; flex-direction: column; }
    .view { display: none; flex-direction: column; flex: 1; }
    .view--active { display: flex; }
    .card { background: var(--Color-cardBackground); border-radius: 16px; padding: 24px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .card--highlight { border-left: 4px solid var(--Color-primary); }
    .heading-medium { font-size: 20px; font-weight: 600; line-height: 1.4; }
    .caption { font-size: 13px; color: var(--Color-textSecondary); line-height: 1.2; }
    .context-status { margin-bottom: 12px; }
    .context-actions { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: auto; padding-top: 24px; }
    .btn-primary { display: inline-flex; align-items: center; justify-content: center; height: 48px; min-width: 160px; padding: 12px 28px; background: var(--Color-primary); color: #fff; font-size: 16px; font-weight: 600; border-radius: 24px; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
    .btn-primary:disabled { background: #ccc; box-shadow: none; }
    .btn-block { width: 100%; min-width: unset; }
    .btn-text { color: var(--Color-textSecondary); padding: 8px 16px; font-size: 15px; }
    .btn-text--accent { color: #2EC4B6; }
    .btn-secondary.btn-platform--meituan { background-color: #FFD100; color: #1A1A1A; border: none; border-radius: 12px; font-weight: 600; }
    .btn-secondary.btn-platform--eleme { background-color: #FF6A00; color: #fff; border: none; border-radius: 12px; font-weight: 600; }
    .hidden { display: none !important; }
  </style>
  <!-- 非关键样式异步加载 -->
  <link rel="preload" href="styles.css?v=3" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.css?v=3"></noscript>
  <script>
    function loadCSS(url) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = url; document.head.appendChild(l); }
    window.addEventListener('load', function () { if (!document.querySelector('link[href*="styles.css"]')) loadCSS('styles.css?v=3'); });
  </script>
    <!-- 条件加载 vConsole 调试工具 -->
  <script>
    (function() {
      // 只有当 URL 中有 debug=true 参数，或者是本地开发时，才启用调试
      var isDebug = window.location.search.indexOf('debug=true') !== -1;
      var isLocal = window.location.hostname === 'localhost' || 
                    window.location.hostname === '127.0.0.1';
      
      if (isDebug || isLocal) {
        var script = document.createElement('script');
        script.src = 'https://unpkg.com/vconsole@latest/dist/vconsole.min.js';
        script.onload = function() {
          new VConsole();
          console.log('🔧 [测试模式] 调试面板已启用');
        };
        document.head.appendChild(script);
      }
    })();
  </script>
</head>
<body>
  <!-- 应用主容器 -->
  <div id="app" class="app">

    <!-- 顶部导航（偏好入口） -->
    <header class="app-header" aria-label="应用顶栏">
      <h1 class="app-logo">今天吃什么</h1>
      <button type="button" id="btn-open-preferences" class="btn-text btn-text--accent" aria-label="美食偏好设置">
        偏好
      </button>
    </header>

    <main class="app-main" role="main">

      <!-- 情境感知页 -->
      <section id="view-context" class="view view--active" aria-labelledby="context-title">
        <div class="card card--highlight context-card">
          <p id="context-status" class="context-status caption" role="status">正在感知你的用餐情境…</p>
          <h2 id="context-narrative" class="context-narrative heading-medium">
            你好！正在为你准备专属问候…
          </h2>
        </div>

        <div class="context-actions">
          <button type="button" id="btn-confirm-context" class="btn-primary btn-block">
            确认，开始推荐
          </button>
          <button type="button" id="btn-swap-context" class="btn-text btn-text--accent">
            换一换情境
          </button>
        </div>

        <button type="button" id="btn-inspire-again" class="btn-secondary btn-block inspire-again hidden">
          给我今日灵感
        </button>
      </section>

      <!-- 偏好设置页 -->
      <section id="view-preferences" class="view" aria-labelledby="prefs-title" hidden>
        <h2 id="prefs-title" class="section-title heading-medium">美食偏好</h2>
        <p class="section-desc">勾选你喜欢的美食类型，推荐会更懂你</p>

        <!-- 热门模板 -->
        <div class="prefs-block">
          <h3 class="prefs-label">热门推荐</h3>
          <div id="template-chips" class="chip-group" role="group" aria-label="热门偏好模板"></div>
        </div>

        <!-- 一级分类 -->
        <div class="prefs-block">
          <h3 class="prefs-label">美食大类</h3>
          <div id="primary-chips" class="chip-group" role="group" aria-label="一级美食分类"></div>
        </div>

        <!-- 二级分类 -->
        <div class="prefs-block">
          <h3 class="prefs-label">细化选择</h3>
          <div id="secondary-chips" class="chip-group" role="group" aria-label="二级菜系分类">
            <p class="chip-placeholder">请先选择上方大类</p>
          </div>
        </div>

        <!-- 忌口 -->
        <div class="prefs-block">
          <h3 class="prefs-label">忌口管理</h3>
          <div id="dietary-preset-chips" class="chip-group" role="group" aria-label="常用忌口"></div>
          <div id="dietary-custom-list" class="chip-group dietary-custom" aria-label="已添加忌口"></div>
          <div class="dietary-input-row">
            <input type="text" id="dietary-input" class="text-input" placeholder="自定义忌口，回车添加" maxlength="20" aria-label="自定义忌口">
            <button type="button" id="btn-add-dietary" class="btn-text btn-text--accent">添加</button>
          </div>
        </div>

        <div class="prefs-footer">
          <button type="button" id="btn-save-preferences" class="btn-primary btn-block">保存偏好</button>
          <button type="button" id="btn-skip-preferences" class="btn-text">暂无，跳过</button>
        </div>
      </section>

      <!-- 推荐结果页 -->
      <section id="view-recommendation" class="view view-recommendation" aria-labelledby="rec-dish-name" hidden>
        <div class="recommendation-card card">
          <span class="rec-category caption" id="rec-category"></span>
          <h2 id="rec-dish-name" class="rec-dish-name heading-large">—</h2>
          <p id="rec-reason" class="rec-reason body-regular">—</p>
          <p id="rec-shops" class="rec-shops caption">—</p>
        </div>

        <div class="recommendation-footer">
          <button type="button" id="btn-accept" class="btn-primary btn-block">就它了！</button>
          <button type="button" id="btn-skip" class="btn-text">跳过（不喜欢）</button>
        </div>
      </section>

      <!-- 行动页 -->
      <section id="view-action" class="view view-action" aria-labelledby="action-dish-name" hidden>
        <div class="action-card card">
          <p class="action-label caption">今日选定</p>
          <h2 id="action-dish-name" class="action-dish-name heading-large">—</h2>
        </div>

        <div class="action-buttons">
          <button type="button" id="btn-copy" class="btn-secondary btn-block">复制名称</button>
          <button type="button" id="btn-meituan" class="btn-secondary btn-block btn-platform--meituan">
            去美团外卖搜索
          </button>
          <button type="button" id="btn-eleme" class="btn-secondary btn-block btn-platform--eleme">
            去淘宝闪购搜索
          </button>
        </div>

        <button type="button" id="btn-back-home" class="btn-text">返回首页</button>
      </section>

    </main>
  </div>

  <!-- 换一换情境浮层 -->
  <div id="modal-context" class="modal-mask hidden" role="dialog" aria-modal="true" aria-labelledby="modal-context-title">
    <div class="modal-content">
      <h3 id="modal-context-title" class="heading-medium">微调用餐情境</h3>
      <p class="modal-desc caption">选择更符合你此刻心情的标签</p>

      <div class="modal-section">
        <h4 class="modal-label">用餐时段</h4>
        <div id="override-meal-chips" class="chip-group" role="group"></div>
      </div>

      <div class="modal-section">
        <h4 class="modal-label">天气心情</h4>
        <div id="override-weather-chips" class="chip-group" role="group"></div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btn-apply-context" class="btn-primary btn-block">应用情境</button>
        <button type="button" id="btn-close-context-modal" class="btn-text">取消</button>
      </div>
    </div>
  </div>

  <!-- 跳过原因浮层 -->
  <div id="modal-skip" class="modal-mask hidden" role="dialog" aria-modal="true" aria-labelledby="modal-skip-title">
    <div class="modal-content">
      <h3 id="modal-skip-title" class="heading-medium">告诉我们原因</h3>
      <p class="modal-desc caption">帮助下次推荐更合你心意</p>

      <div id="skip-reason-options" class="skip-options" role="radiogroup"></div>

      <div class="modal-footer">
        <button type="button" id="btn-confirm-skip" class="btn-primary btn-block">确认跳过</button>
        <button type="button" id="btn-close-skip-modal" class="btn-text">取消</button>
      </div>
    </div>
  </div>

  <!-- 全局 Toast -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <script type="module" src="app.js?v=3"></script>
  <!-- 在 body 开头添加 -->
  <div id="debug-indicator" style="display: none; background: yellow; padding: 5px; text-align: center;">
    🧪 测试模式 | 调试信息请点击右下角绿色按钮
  </div>

  <script>
    if (window.location.search.indexOf('debug=true') !== -1) {
      document.getElementById('debug-indicator').style.display = 'block';
    }
  </script>
</body>
</html>
